<section class="connexion-page">
  <div class="connexion-card">
    <h2>Connexion</h2>

    <div class="divider">
      <img class="divider-badge" src="/assets/images/konoha-symbol.png" alt="Symbole de Konoha">
    </div>

    <form (submit)="connecter()" [formGroup]="connexionForm">
      <div class="field-wrapper">
        <div class="field field--username">
          <span class="field-icon">🥷</span>
          <input
            type="text"
            placeholder="Nom d'utilisateur"
            [formControl]="usernameCtrl">
        </div>
      </div>

      <div class="field-wrapper">
        <div class="field field--password">
          <span class="field-icon">🔒</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Mot de passe"
            [formControl]="passwordCtrl">
          <button type="button" class="toggle-visibility" (click)="showPassword = !showPassword">
            {{ showPassword ? '👁' : '' }}
          </button>
        </div>
      </div>

      <div class="field-row">
        <label class="remember">
          <input type="checkbox"> Se souvenir de moi
        </label>
      </div>

      @if (loginError()) {
        <p class="error-message">Identifiant ou mot de passe incorrect.</p>
      }

      <button type="submit" class="submit-btn" [disabled]="connexionForm.invalid">
        🍃 Entrer dans le village
      </button>

      <a class="inscription-link" routerLink="/inscription">Pas encore de compte ? S'inscrire</a>
    </form>
  </div>
</section>
